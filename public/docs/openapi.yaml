  # ── Departments (RO only) ─────────────────────────────────────────────────

  /ro/departments/{department}:
    put:
      tags: [Registration Officer]
      summary: Update department
      description: Update a department's name, code, or HOD assignment. RO only.
      parameters:
        - name: department
          in: path
          required: true
          schema:
            type: integer
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Computer Science
                code:
                  type: string
                  example: CSC
                hod_id:
                  type: integer
                  nullable: true
                  example: 2
      responses:
        '200':
          description: Department updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

    delete:
      tags: [Registration Officer]
      summary: Delete department
      description: Delete a department. Blocked if it still has courses assigned. RO only.
      parameters:
        - name: department
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Department deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Department still has courses
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /ro/departments/create:
    post:
      tags: [Registration Officer]
      summary: Create department
      description: Create a new department, optionally assigning an HOD. RO only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, code]
              properties:
                name:
                  type: string
                  maxLength: 150
                  example: Computer Science
                code:
                  type: string
                  maxLength: 10
                  example: CSC
                hod_id:
                  type: integer
                  nullable: true
                  example: 2
      responses:
        '201':
          description: Department created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Department created successfully.
                  department:
                    $ref: '#/components/schemas/Department'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /ro/departments/{department}/assign-hod:
    patch:
      tags: [Registration Officer]
      summary: Assign HOD to department
      description: |
        Assigns a user with the HOD role as head of the department.
        Automatically unassigns them from any other department they currently lead.
        RO only.
      parameters:
        - name: department
          in: path
          required: true
          schema:
            type: integer
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [hod_id]
              properties:
                hod_id:
                  type: integer
                  example: 2
      responses:
        '200':
          description: HOD assigned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
