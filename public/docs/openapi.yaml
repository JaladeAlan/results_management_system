        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: User does not have the HOD role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

